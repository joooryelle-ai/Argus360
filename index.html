const CLIP={4:"polygon(0% 65%,0% 43%,10% 8%,98% 8%,100% 15%,100% 92%,0% 92%)",d:"polygon(0% 28%,12% 12%,28% 12%,28% 18%,48% 18%,48% 10%,78% 10%,78% 22%,96% 22%,96% 64%,80% 64%,80% 78%,58% 78%,58% 66%,34% 66%,34% 62%,0% 62%)"};
let state={role:"visitor",fl:4,sel:SHOPS.find(s=>s.id==="f4-nash"),view:{rx:60,rz:-10,z:1,x:0,y:0},api:""};
let drag=null;const root=document.getElementById('root');
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function clamp(v,min,max){return Math.min(max,Math.max(min,v))}function st(s){return({open:"открыто",maintenance:"техобслуживание",available:"свободная площадь"}[s]||"—")}function mask(v){const k=String(v||'').trim();return k.length<=12?k:`${k.slice(0,7)}••••••••••${k.slice(-4)}`}
function chart(data,field){const max=Math.max(...data.map(d=>d[field]));return `<div class="mini-chart">${data.map(d=>`<div class="bar-wrap"><div class="bar" style="height:${Math.max(12,d[field]/max*108)}px"></div><span class="bar-label">${esc(d.time||d.label)}</span></div>`).join('')}</div>`}
function roleTabs(cls='role-tabs'){return `<nav class="${cls}">${ROLES.map(r=>`<button data-role="${r[0]}" class="${state.role===r[0]?'active':''}">${r[2]} ${r[1]}</button>`).join('')}</nav>`}
function card(title,text,icon,children=''){return `<div class="card glass"><div class="card-head"><div><h3>${title}</h3>${text?`<p>${text}</p>`:''}</div><div>${icon||''}</div></div>${children}</div>`}
function marker(s){return `<button class="marker ${state.sel&&state.sel.id===s.id?'active':''}" data-shop="${s.id}" title="${esc(s.name)}" style="left:${s.x}%;top:${s.y}%"><span class="dot">${s.icon}</span><span>${esc(s.name)}</span></button>`}
function twin(){const is4=state.fl===4, shops=SHOPS.filter(s=>s.floor===state.fl), walls=is4?F4_WALLS:[], cols=is4?F4_COLS:[[20,50],[30,50],[40,50],[50,50],[60,50],[70,50],[80,50]], am=is4?F4_AMENITIES:[{id:"st",kind:"stairs",x:50,y:72,title:"Лестница"}], clip=is4?CLIP[4]:CLIP.d, v=state.view;
return `<div class="twin glass"><div class="overlay floor-label"><small>3D-модель</small><b>${state.fl} этаж</b></div><button class="overlay reset" id="resetView">Сбросить вид</button><div class="overlay hint"><span>🔄 Поворот</span><span>🔍 Увеличить</span></div><div class="stage" id="stage"><div class="model" id="model" style="transform:translate(-50%,-50%) translate(${v.x}px,${v.y}px) scale(${v.z}) rotateX(${v.rx}deg) rotateZ(${v.rz}deg)"><div class="base-shadow"></div><div class="floor-back" style="clip-path:${clip}"></div><div class="floor-main" style="clip-path:${clip}"></div><div class="floor-border" style="clip-path:${clip}"></div><div class="corridor" style="left:13.8%;top:49.9%;width:73.5%;height:7.2%"></div><div class="corridor" style="left:49.2%;top:39.8%;width:1.7%;height:23.6%"></div>${walls.map(w=>`<div class="wall" style="left:${w[0]}%;top:${w[1]}%;width:${w[2]}%;height:${w[3]}%"></div>`).join('')}${cols.map(c=>`<div class="col" style="left:${c[0]}%;top:${c[1]}%"></div>`).join('')}${am.map(a=>`<div class="amenity" title="${a.title}" style="left:${a.x}%;top:${a.y}%"><span class="dot">${a.kind==='stairs'?'↗':a.kind==='wc'?'WC':'⇅'}</span><span>${a.title}</span></div>`).join('')}${shops.map(marker).join('')}</div></div></div>`}
function visitor(){const list=SHOPS.filter(s=>s.floor===(state.sel?.floor||4)).slice(0,7);return card('Для посетителей','Поиск магазина, маршрут, акции и доступная навигация.','♿',`<div class="input-row">⌕<input placeholder="Найти: аптека, банкомат, кофе..."></div><div class="btn-grid"><button class="btn primary">Маршрут</button><button class="btn secondary">Парковка</button></div>`)+card('Каталог точек','','',`<div class="list">${list.map(s=>`<button class="shop-btn ${state.sel&&state.sel.id===s.id?'active':''}" data-shop="${s.id}"><span><b>${s.icon} ${esc(s.name)}</b><br><small>${esc(s.cat)} · ${s.floor} этаж</small></span><span>›</span></button>`).join('')}</div>`)}
function tenant(){return card('Кабинет арендатора','Витрина, акции, заявки и аналитика.','🏬',`<div style="margin-top:16px;border-radius:18px;background:#0f172a;color:white;padding:16px"><small>Выбранная точка</small><div style="font-size:22px;font-weight:950;margin-top:4px">${esc(state.sel?.name||'Coffee Point')}</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;font-size:12px;margin-top:12px"><div style="background:rgba(255,255,255,.1);border-radius:12px;padding:8px"><b>+18%</b><br>трафик</div><div style="background:rgba(255,255,255,.1);border-radius:12px;padding:8px"><b>2</b><br>акции</div><div style="background:rgba(255,255,255,.1);border-radius:12px;padding:8px"><b>1</b><br>заявка</div></div></div>`)+card('Посещаемость','','',chart(VISITS,'visits'))}
function apiCard(){const clean=state.api.trim(), ok=API_RE.test(clean), filled=clean.length>0;return card('Формат OpenAI API Key','Проверка формата без сохранения.','🔑',`<input id="apiInput" class="api-input" value="${esc(state.api)}" placeholder="${API_PH}" autocomplete="off" spellcheck="false"><div class="info-box"><div><b>Формат:</b><code>sk-... / sk-proj-...</code></div><div><b>Маска:</b><code>${filled?mask(clean):'ключ не введён'}</code></div></div><div class="api-status ${!filled?'empty':ok?'ok':'bad'}">${!filled?'Введите ключ.':ok?'Формат похож на OpenAI API Key.':'Неверный формат.'}</div><p>В production храните ключ только на сервере в <code>OPENAI_API_KEY</code>.</p>`)}
function stat(icon,title,val,note){return `<div class="stat glass"><div class="stat-top"><div class="stat-ico">${icon}</div><span class="live">live</span></div><div class="stat-val">${val}</div><div class="stat-title">${title}</div><div class="stat-note">${note}</div></div>`}
function management(){return `<div class="stats">${stat('👥','Посетителей','3 842','по всем этажам')}${stat('🅿️','Парковка','126','из 420 мест')}${stat('⚡','Энергия','82%','от лимита')}${stat('⚒','Заявки','17','5 срочных')}</div>${card('Оперативный мониторинг','Трафик, тревоги, инженерные системы и BMS.','👁',chart(TRAFFIC,'people'))}`}
function modules(){const items={visitor:[["↗","Маршрутизация","До магазина с комфортом!"],["★","Избранное","Любимые магазины и акции"],["📣","Афиша","События и мероприятия"],["🅿️","Парковка","Свободные места"]],tenant:[["🏬","Витрина","Фото и контакты"],["📣","Акции","Запуск по расписанию"],["📊","Аналитика","Трафик и тепловые карты"],["💬","Заявки","Связь с УК"]],management:[["🏢","BMS","Свет, климат, лифты"],["🛡️","Безопасность","Камеры и эвакуация"],["□","Договоры","Арендаторы и счета"],["⚒","Администрация","Роли, новости, 3D-сцена"]]}[state.role];return `<div class="modules">${items.map(it=>`<div class="module glass"><div class="ico">${it[0]}</div><h3>${it[1]}</h3><p>${it[2]}</p></div>`).join('')}</div>`}
function side(){return state.role==='visitor'?visitor():state.role==='tenant'?tenant():management()}

el?.cat||'Объект')} · ${state.sel?.floor||state.fl} этаж</div></div><span class="badge">${state.sel?.traffic||0}%</span></div><div class="progress"><div style="width:${state.sel?.traffic||0}%"></div></div><div style="margin-top:12px;color:#64748b;font-size:12px">Статус: ${st(state.sel?.status)}</div></div>`)}</aside></section></main>`;bind()}
function bind(){document.querySelectorAll('[data-role]').forEach(b=>b.onclick=()=>{state.role=b.dataset.role;render()});document.querySelectorAll('[data-floor]').forEach(b=>b.onclick=()=>{state.fl=Number(b.dataset.floor);state.sel=SHOPS.find(s=>s.floor===state.fl)||null;render()});document.querySelectorAll('[data-shop]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();state.sel=SHOPS.find(s=>s.id===b.dataset.shop);render()});const api=document.getElementById('apiInput');if(api)api.oninput=e=>{state.api=e.target.value;render()};const reset=document.getElementById('resetView');if(reset)reset.onclick=e=>{e.stopPropagation();state.view={rx:60,rz:-10,z:1,x:0,y:0};render()};const stage=document.getElementById('stage');if(stage){stage.onpointerdown=e=>{if(e.target.closest('[data-shop]'))return;stage.setPointerCapture?.(e.pointerId);drag={x:e.clientX,y:e.clientY,mode:e.button===2||e.shiftKey?'pan':'rot',view:{...state.view}}};stage.onpointermove=e=>{if(!drag)return;const dx=e.clientX-drag.x,dy=e.clientY-drag.y;state.view=drag.mode==='pan'?{...drag.view,x:drag.view.x+dx,y:drag.view.y+dy}:{...drag.view,rz:drag.view.rz+dx*.24,rx:clamp(drag.view.rx-dy*.16,32,78)};const m=document.getElementById('model'),v=state.view;if(m)m.style.transform=`translate(-50%,-50%) translate(${v.x}px,${v.y}px) scale(${v.z}) rotateX(${v.rx}deg) rotateZ(${v.rz}deg)`};stage.onpointerup=e=>{stage.releasePointerCapture?.(e.pointerId);drag=null};stage.onpointerleave=()=>drag=null;stage.onwheel=e=>{e.preventDefault();state.view={...state.view,z:clamp(state.view.z-e.deltaY*.0011,.68,1.85)};const m=document.getElementById('model'),v=state.view;if(m)m.style.transform=`translate(-50%,-50%) translate(${v.x}px,${v.y}px) scale(${v.z}) rotateX(${v.rx}deg) rotateZ(${v.rz}deg)`};stage.oncontextmenu=e=>e.preventDefault()}}
function tests(){const errors=[];if(FLOORS.length!==4)errors.push('Нужно 4 этажа.');if(new Set(SHOPS.map(s=>s.id)).size!==SHOPS.length)errors.push('ID магазинов должны быть уникальными.');if(!SHOPS.every(s=>FLOORS.includes(s.floor)))errors.push('Некорректный floor у магазина.');if(!SHOPS.every(s=>typeof s.icon==='string'))errors.push('У каждого магазина должна быть строковая иконка.');if(!SHOPS.every(s=>s.x>=0&&s.x<=100&&s.y>=0&&s.y<=100))errors.push('Координаты магазинов некорректны.');if(!SHOPS.every(s=>STATUS.includes(s.status)))errors.push('Некорректный статус магазина.');if(F4_WALLS.length<40)errors.push('Для 4 этажа должно быть достаточно детальных стен.');if(!F4_AMENITIES.some(a=>a.kind==='wc'))errors.push('Нужен туалет.');if(!F4_AMENITIES.some(a=>a.kind==='elevator'))errors.push('Нужен лифт.');if(!F4_AMENITIES.some(a=>a.kind==='stairs'))errors.push('Нужна лестница.');if(!API_RE.test('sk-proj-abcdefghijklmnopqrstuvwxyz1234567890'))errors.push('Regex API key должен принимать sk-proj.');if(API_RE.test('pk-test-abcdefghijklmnopqrstuvwxyz1234567890'))errors.push('Regex API key не должен принимать pk-test.');if(errors.length)throw new Error(errors.join(' '))}
tests();render();
}catch(e){document.getElementById('root').innerHTML='<div class="error">Ошибка запуска: '+String(e.message||e)+'</div>';console.error(e)}
